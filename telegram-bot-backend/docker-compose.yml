services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bot_db
      POSTGRES_USER: bot_user
      POSTGRES_PASSWORD: bot_pass
    ports:
      - "5432:5432"
    volumes:
      - bot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot_user -d bot_db"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - bot_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  init-db:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["sh", "-c", "python -m app.db.init_db && python -m app.db.seed"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    depends_on:
      init-db:
        condition: service_completed_successfully
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["python", "-m", "app.bot.main"]
    depends_on:
      init-db:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["celery", "-A", "app.tasks.celery_app.celery_app", "worker", "--loglevel=INFO"]
    depends_on:
      init-db:
        condition: service_completed_successfully
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["celery", "-A", "app.tasks.celery_app.celery_app", "beat", "--loglevel=INFO"]
    depends_on:
      init-db:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  bot_postgres_data:
  bot_redis_data:
