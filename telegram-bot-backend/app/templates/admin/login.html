<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-100 flex items-center justify-center p-4">
    <form method="post" action="/admin/login" class="bg-white w-full max-w-md rounded-2xl shadow p-6 space-y-4">
        <h1 class="text-2xl font-bold text-slate-900">Вход в панель</h1>
        <p class="text-sm text-slate-600">Только для владельца бота</p>

        {% if error %}
        <div class="rounded-lg bg-red-50 text-red-700 text-sm p-3">{{ error }}</div>
        {% endif %}

        <label class="block text-sm font-medium text-slate-700">Логин
        <input name="username" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2" required />
      </label>

        <label class="block text-sm font-medium text-slate-700">Пароль
        <input name="password" type="password" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2" required />
      </label>

        <button class="w-full rounded-lg bg-slate-900 text-white py-2.5 font-medium">Войти</button>
    </form>
</body>

</html>
