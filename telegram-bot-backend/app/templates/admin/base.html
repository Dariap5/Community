<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Admin{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    {% block head %}{% endblock %}
</head>

<body class="{% block body_class %}min-h-screen bg-slate-100 text-slate-900{% endblock %}">
    {% block content %}{% endblock %}
    <div id="toast-root" class="pointer-events-none fixed right-4 top-4 z-[1000] flex w-full max-w-sm flex-col gap-2"></div>
</body>

</html>
